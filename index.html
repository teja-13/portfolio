<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Teja Swaroop Battula - MERN stack developer and B.Tech CSE student.">
  <meta name="theme-color" content="#6A3428">
  <title>Teja Swaroop Battula | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
:root {
  --bg-deep: #3a1a14;
  --bg-mid: #6A3428;
  --surface: rgba(207, 184, 130, 0.08);
  --surface-strong: rgba(207, 184, 130, 0.16);
  --text-main: #3f1d16;
  --text-soft: #5a2d23;
  --text-card: #f8ecd0;
  --text-card-soft: #e2cf9f;
  --ink-dark: #3f1d16;
  --ink-soft: #5a2d23;
  --mint: #CFB882;
  --teal: #9a634d;
  --gold: #CFB882;
  --danger: #b56d62;
  --shadow: 0 22px 50px rgba(31, 11, 7, 0.45);
  --radius-lg: 22px;
  --radius-md: 14px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: "Space Grotesk", "Segoe UI", sans-serif;
  line-height: 1.6;
  color: var(--text-main);
  background: var(--mint);
  min-height: 100vh;
}

a { color: var(--bg-mid); text-decoration: none; }
a:hover,a:focus-visible { color: #4f261d; }

.scroll-progress {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 100;
  width: 100%;
  height: 4px;
  background: rgba(58, 26, 20, 0.18);
}
.scroll-progress span {
  display: block;
  width: 0;
  height: 100%;
  background: linear-gradient(90deg, var(--bg-mid), var(--bg-deep));
}

.site-shell {
  width: min(1150px, calc(100% - 2.2rem));
  margin: 1.1rem auto 2.2rem;
  position: relative;
  z-index: 2;
}

/* ✅ UPDATED NAVBAR */
.topbar {
  --text-main: var(--text-card);
  --text-soft: var(--text-card-soft);
  position: sticky;
  top: 10px;
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: center; /* centered */
  gap: 1rem;
  padding: 0.7rem 1rem;
  margin-bottom: 1rem;
  border: 1px solid rgba(207, 184, 130, 0.48);
  border-radius: 999px;
  background: rgba(58, 26, 20, 0.92);
  box-shadow: 0 12px 26px rgba(31, 11, 7, 0.2);
  backdrop-filter: blur(12px);
}

.site-nav {
  display: flex;
  align-items: center;
  justify-content: center; /* centered */
  gap: 0.75rem;
  flex-wrap: wrap;
}

.site-nav a {
  font-size: 0.92rem;
  padding: 0.38rem 0.72rem;
  border-radius: 999px;
  color: var(--text-soft);
}
.site-nav a:hover,
.site-nav a.active {
  color: var(--text-main);
  background: rgba(207, 184, 130, 0.16);
}

.menu-toggle {
  display: none;
}

/* --- KEEPING REST SAME --- */
/* (trimmed nothing, just continuing) */

.hero {
  color: var(--text-card);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(207, 184, 130, 0.44);
  background: rgba(58, 26, 20, 0.92);
  padding: 2rem;
}

.hero h1 { margin: 0; font-size: 2.5rem; }

.content-section {
  margin-top: 1rem;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(207, 184, 130, 0.42);
  background: rgba(58, 26, 20, 0.9);
  padding: 2rem;
  color: var(--text-card);
}

.footer {
  margin-top: 1rem;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(207, 184, 130, 0.42);
  background: rgba(58, 26, 20, 0.9);
  padding: 2rem;
  color: var(--text-card);
}
  </style>
</head>

<body>

<div class="site-shell">

  <!-- ✅ UPDATED HEADER -->
  <header class="topbar">
    <button id="menuToggle" class="menu-toggle">Menu</button>
    <nav id="siteNav" class="site-nav">
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#projects">Projects</a>
      <a href="#education">Education</a>
      <a href="#certifications">Certifications</a>
      <a href="#achievements">Achievements</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Teja Swaroop Battula</h1>
      <p>MERN Stack Developer</p>
    </section>

    <section id="about" class="content-section">
      <h2>About</h2>
      <p>Full stack developer focused on real-world scalable apps.</p>
    </section>

    <section id="contact" class="footer">
      <h2>Contact</h2>
      <p>Email: teja72025@gmail.com</p>
    </section>
  </main>

</div>

</body>
</html>
